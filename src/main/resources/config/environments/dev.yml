server:
  tomcat:
    mbeanregistry:
      enabled: true

spring:
  ai:
    openai:
      api-key: "temp_ai_api_key"
      chat:
        options:
          model: gpt-3.5-turbo
          temperature: 0.0
          maxTokens: 300
      embedding:
        options:
          model: text-embedding-3-small

logging:
  level:
    org:
      apache:
        coyote:
          http11: trace

decorator:
  datasource:
    p6spy:
      enable-logging: true

cloud:
  storage:
    oci:
      region: ${CLOUD_STORAGE_OCI_REGION}
      bucket: ${CLOUD_STORAGE_OCI_BUCKET}
      namespace: ${CLOUD_STORAGE_OCI_NAMESPACE}
      tenancy-id: ${CLOUD_STORAGE_OCI_TENANCY_ID}
      user-id: ${CLOUD_STORAGE_OCI_USER_ID}
      fingerprint: ${CLOUD_STORAGE_OCI_FINGERPRINT}
      private-key: ${CLOUD_STORAGE_OCI_PRIVATE_KEY}
      passphrase: ${CLOUD_STORAGE_OCI_PASSPHRASE:}
